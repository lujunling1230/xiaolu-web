<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>致用 · 薪火录</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap');
        
        :root {
            --wood-color: #5c4033;
            --light-wood: #f5f5e8;
            --metal: #e0e0e0;
            --shadow: rgba(0,0,0,0.05);
            --shadow-hover: rgba(0,0,0,0.1);
        }
        
        body {
            margin: 0;
            padding: 2rem;
            font-family: 'Noto Sans SC', sans-serif;
            color: #333;
            background-color: #f5f5e8;
            background-image: 
                radial-gradient(#e8e8e8 1px, transparent 1px),
                radial-gradient(#e8e8e8 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            line-height: 1.6;
        }
        
        .header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }
        
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background-color: rgba(92, 64, 51, 0.05);
            border-radius: 8px;
        }
        
        .nav-link {
            padding: 0.5rem 1rem;
            color: var(--wood-color);
            text-decoration: none;
            font-weight: 500;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        
        .nav-link:hover {
            background-color: rgba(92, 64, 51, 0.1);
        }
        
        .back-button {
            position: absolute;
            left: 1rem;
            top: 1rem;
            padding: 0.5rem 1rem;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 4px;
            color: #333;
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .back-button:hover {
            background: #e0e0e0;
        }
        
        .title {
            font-family: 'Noto Serif SC', serif;
            font-size: 2.5rem;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }
        
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--wood-color), transparent);
            border: none;
            margin: 1rem auto;
            width: 60%;
        }
        
        .subtitle-container {
            display: inline-block;
            background-color: rgba(92, 64, 51, 0.1);
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            transform: rotate(-1deg);
            margin-top: 1rem;
        }
        
        .subtitle {
            font-weight: 700;
            color: var(--wood-color);
            margin: 0;
        }
        
        .subtitle-en {
            font-size: 0.8rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.2rem;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin: 3rem auto;
            max-width: 1200px;
        }
        
        .card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px var(--shadow);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 16px var(--shadow-hover);
        }
        
        .card::after {
            content: "";
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
        }
        
        .card-icon {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        
        .card-title {
            font-weight: 700;
            margin: 0 0 0.5rem 0;
        }
        
        .card-desc {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.4;
            margin: 0;
        }
        
        .card:hover .try-button {
            opacity: 1;
        }
        
        .try-button {
            position: absolute;
            bottom: 1rem;
            left: 1.5rem;
            background: transparent;
            color: #007bff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease;
            font-family: inherit;
        }
        
        .warning {
            max-width: 800px;
            margin: 3rem auto;
            padding: 1rem;
            background-color: #fff8e1;
            border: 1px solid #ffcdd2;
            border-radius: 4px;
            color: #d9534f;
            font-size: 0.85rem;
            text-align: center;
        }
        
        .tool-decoration {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 10" opacity="0.1"><path d="M10,5 Q15,0 20,5 Q25,10 30,5 Q35,0 40,5 Q45,10 50,5 Q55,0 60,5 Q65,10 70,5 Q75,0 80,5 Q85,10 90,5" stroke="black" fill="none"/></svg>');
            background-repeat: repeat-x;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-button">← 返回主站</a>
        <h1 class="title">致用 · 薪火录</h1>
        <hr class="divider">
        <div class="subtitle-container">
            <h2 class="subtitle">薪火（实验场）</h2>
            <div class="subtitle-en">HERITAGE LAB</div>
        </div>
    </div>
    
    <div class="nav-bar">
        <a href="leafbook" class="nav-link">项目集</a>
        <a href="#妙妙工具箱" class="nav-link">造物利器</a>
        <a href="life-cinema" class="nav-link">闲情</a>
    </div>
    
    <div class="grid">
        <div class="card">
            <div class="card-icon">🔧</div>
            <h3 class="card-title">妙妙工具箱</h3>
            <p class="card-desc">实用工具集合，解决日常小问题</p>
            <button class="try-button">上手试试</button>
        </div>
        
        <div class="card">
            <div class="card-icon">📦</div>
            <h3 class="card-title">造物利器</h3>
            <p class="card-desc">创意实现工具包，助力项目开发</p>
            <button class="try-button">上手试试</button>
        </div>
        
        <div class="card">
            <div class="card-icon">🎮</div>
            <h3 class="card-title">数字工坊</h3>
            <p class="card-desc">交互式实验空间，探索数字可能</p>
            <button class="try-button">上手试试</button>
        </div>
        
        <div class="card">
            <div class="card-icon">🧩</div>
            <h3 class="card-title">组件实验室</h3>
            <p class="card-desc">可复用组件库，加速开发流程</p>
            <button class="try-button">上手试试</button>
        </div>
        
        <div class="card">
            <div class="card-icon">📊</div>
            <h3 class="card-title">数据工场</h3>
            <p class="card-desc">数据处理与分析工具集合</p>
            <button class="try-button">上手试试</button>
        </div>
        
        <div class="card">
            <div class="card-icon">🖌️</div>
            <h3 class="card-title">设计车间</h3>
            <p class="card-desc">创意设计与原型制作工具</p>
            <button class="try-button">上手试试</button>
        </div>
    </div>
    
    <div class="warning">
        ⚠️ 本内容为实验性研究，部分功能仍在开发中，实际效果可能有所不同
    </div>
    
    <div class="tool-decoration"></div>
</body>
</html>
