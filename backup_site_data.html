<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>备份胶片数据</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Noto Serif SC", "Georgia", "Segoe UI", sans-serif;
      background: #FAF9F6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: #fff;
      padding: 48px 56px;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(60, 80, 60, 0.08);
      text-align: center;
      max-width: 420px;
      width: 100%;
    }

    .card-icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.85;
    }

    h2 {
      color: #3d3d3d;
      margin-bottom: 12px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    p {
      color: #8a8a8a;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    button {
      background: #8D9A8B;
      color: #fff;
      border: none;
      padding: 16px 36px;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 16px rgba(141, 154, 139, 0.3);
    }

    button:hover {
      background: #7a8a78;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(141, 154, 139, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: #8D9A8B;
      color: #fff;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.35s ease;
      box-shadow: 0 4px 16px rgba(141, 154, 139, 0.25);
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .data-preview {
      margin-top: 24px;
      padding: 16px;
      background: rgba(141, 154, 139, 0.04);
      border-radius: 12px;
      border: 1px solid rgba(141, 154, 139, 0.12);
      text-align: left;
      display: none;
    }

    .data-preview.visible {
      display: block;
    }

    .data-preview h4 {
      font-size: 12px;
      color: #8a8a8a;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .data-preview ul {
      list-style: none;
      font-size: 12px;
      color: #6a6a6a;
      line-height: 1.8;
    }

    .data-preview li {
      padding-left: 8px;
      border-left: 2px solid rgba(141, 154, 139, 0.3);
    }

    @media (max-width: 480px) {
      .card {
        padding: 36px 28px;
      }

      h2 {
        font-size: 18px;
      }

      button {
        padding: 14px 28px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-icon">🎞️</div>
    <h2>备份我的胶片数据</h2>
    <p>点击按钮将把当前网站的 localStorage 导出为 JSON 文件。请确保在本站的浏览器标签页中打开此页面。</p>
    <button onclick="exportData()">📥 导出数据到本地</button>

    <div class="data-preview" id="preview">
      <h4>检测到以下数据项：</h4>
      <ul id="previewList"></ul>
    </div>
  </div>

  <div class="toast" id="toast">✅ 已导出，请保存到桌面或安全位置</div>

  <script>
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    function updatePreview(keys) {
      const preview = document.getElementById('preview');
      const list = document.getElementById('previewList');
      if (keys.length === 0) {
        preview.classList.remove('visible');
        return;
      }
      list.innerHTML = keys.map(k => `<li>${k}</li>`).join('');
      preview.classList.add('visible');
    }

    // 页面加载时预览数据项
    (function init() {
      const keys = Object.keys(localStorage);
      updatePreview(keys);
    })();

    function exportData() {
      const keys = Object.keys(localStorage);

      if (keys.length === 0) {
        showToast('⚠️ 当前网站没有 localStorage 数据');
        return;
      }

      const data = {};
      keys.forEach(k => {
        data[k] = localStorage.getItem(k);
      });

      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');

      const now = new Date();
      const ts = now.getFullYear() +
        String(now.getMonth() + 1).padStart(2, '0') +
        String(now.getDate()).padStart(2, '0') + '_' +
        String(now.getHours()).padStart(2, '0') +
        String(now.getMinutes()).padStart(2, '0') +
        String(now.getSeconds()).padStart(2, '0');

      a.href = url;
      a.download = 'life_film_backup_' + ts + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      showToast('✅ 已导出，请保存到桌面或安全位置');
    }
  </script>
</body>
</html>
